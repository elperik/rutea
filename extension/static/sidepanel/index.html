<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rutea</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="app-header">
        <div>
          <p class="eyebrow">Navegación asistida</p>
          <h1>Rutea</h1>
        </div>
        <span id="status" role="status">Preparado</span>
      </header>

      <section aria-labelledby="recording-title">
        <h2 id="recording-title">Grabación</h2>
        <div class="actions">
          <button id="start" type="button">Iniciar</button>
          <button id="stop" type="button" class="secondary">Detener</button>
          <button id="clear" type="button" class="danger">Limpiar</button>
          <button id="add-assist-recording" type="button" class="secondary">
            Añadir instrucción IA
          </button>
        </div>
      </section>

      <section aria-labelledby="host-title">
        <h2 id="host-title">Host local</h2>
        <div class="actions">
          <button id="ping-host" type="button" class="secondary">Probar conexión Java</button>
          <button id="open-control-panel" type="button" class="secondary">Abrir panel</button>
        </div>
      </section>

      <section aria-labelledby="steps-title">
        <div class="section-heading">
          <h2 id="steps-title">Pasos grabados</h2>
          <span id="step-count">0</span>
        </div>
        <pre id="steps" aria-live="polite">[]</pre>
      </section>

      <section aria-labelledby="library-title">
        <div class="section-heading">
          <h2 id="library-title">Biblioteca de rutinas</h2>
          <span id="routine-count">0</span>
        </div>
        <div class="actions">
          <button id="save-routine" type="button">Guardar grabación como rutina</button>
          <label class="import-label">
            Importar
            <input id="import-routine" type="file" accept="application/json" hidden />
          </label>
        </div>
        <ul id="routines" aria-live="polite"></ul>
      </section>

      <section id="editor" aria-labelledby="editor-title" hidden>
        <div class="section-heading">
          <h2 id="editor-title">Editor de rutina</h2>
          <button id="editor-close" type="button" class="secondary">Cerrar</button>
        </div>
        <label class="field">
          <span>Nombre</span>
          <input id="editor-name" type="text" />
        </label>
        <ol id="editor-steps"></ol>
        <button id="editor-add-assist" type="button" class="secondary">Añadir instrucción IA</button>
        <h3 class="editor-subtitle">Variables</h3>
        <ul id="editor-variables"></ul>
        <button id="editor-save" type="button">Guardar cambios</button>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
